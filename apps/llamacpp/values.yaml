# Default values for llamacpp.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Namespace
namespace: llama

# Service configuration
service:
  name: llama-api
  type: LoadBalancer
  port: 8080
  targetPort: 8080

# Deployment configuration
deployment:
  name: llama-server
  replicas: 1
  image: ghcr.io/kyroninja/llamacpp-arm64:latest
  modelFile: "/models/ggml-org_gemma-3-1b-it-GGUF_gemma-3-1b-it-Q4_K_M.gguf"
  host: "0.0.0.0"
  port: 8080
  contextSize: 4096
  parallelSlots: 2
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"   # Low request so scheduler can place the pod
    limits:
      memory: "4Gi"
      cpu: "3500m"  # Leave ~0.5 core for OS/other pods on RPi5 quad-core

# Volume configuration
volume:
  name: model-storage
  hostPath: "/home/iniweb/llm-models"
  type: Directory